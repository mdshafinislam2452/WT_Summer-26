
<!DOCTYPE html>
<html>
 
<head>
    <title>GET STARTED</title>
</head>
 
<body>
    <form method="post">
 
        <h1>Create your workspace</h1>
 
        <div class="field">
            <label for="fname">Full Name</label><br>
            <input type="text" id="fname" placeholder="Jane Deo">
        </div>
 
        <div class="field">
            <label for="nmbr">Phone number</label><br>
            <select id="nmbr" name="nmbr">
                <option value="">5551234567</option>
                <option value="6661234567">6661234567</option>
                <option value="7771234567">7771234567</option>
                <option value="8887654123">8887654123</option>
                <option value="9997415263">9997415263</option>
                <option value="1009632584">1009632584</option>
            </select>
        </div>
 
        <div class="field">
            <label for="date">Date of Birth</label><br>
            <input type="date" id="date">
        </div>
 
        <div class="field">
            <label for="mail">Work email</label><br>
            <input type="email" id="mail" placeholder="jane@example.com">
        </div>
 
        <div class="field">
            <label for="pass">Password</label><br>
            <input type="password" id="pass" placeholder="At least 8 characters">
        </div>
 
        <div class="check">
            <input type="checkbox" name="RB" value="rb">Email me product updates and tips
            <br>
            <input type="checkbox" name="PP" value="pp">I agree to the Terms & Privacy Policy
        </div>
 
        <br>
 
        <div class="btn">
            <input type="submit" value="Create workspace">
            <input type="reset" value="Reset">
        </div>
 
    </form>
    </div>
 
</body>
 
</html>
