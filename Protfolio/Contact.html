<!DOCTYPE html>
<html>
 
<head>
<title>Contact Me</title>
<link rel="stylesheet" href="../css/style.css">
</head>
 
<body>
 
    <header class="navbar">
<h2 class="logo">MyPortfolio</h2>
<nav>
<a href="../index.html">Home</a>
<a href="Education.html">Education</a>
<a href="Projects.html">Projects</a>
<a href="Experience.html">Experience</a>
<a href="contact.html">Contact</a>
</nav>
</header>
 
    <h2 class="card">Contact Me</h2>
 
    <form class="card">
 
        <fieldset>
<legend>Name</legend>
            First Name: <input type="text"><br><br>
            Last Name: <input type="text"><br><br>
            Gender:
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<br><br>
            Email: <input type="email">
</fieldset>
 
        <br>
 
        <fieldset>
<legend>Services</legend>
<input type="checkbox"> Web Development
<input type="checkbox"> AI/ML
<input type="checkbox"> Backend
</fieldset>
 
        <br>
 
        <fieldset>
<legend>Reason of Contact</legend>
<select>
<option>Job</option>
<option>Projects</option>
<option>Thesis</option>
</select>
</fieldset>
 
        <br>
 
        <fieldset>
<legend>Book Slot</legend>
            Date: <input type="date">
</fieldset>
 
        <br>
 
        <label for="message">Message:</label><br>
<textarea id="message" name="message" rows="5" cols="30" placeholder="Write your message here..."></textarea>
 
        <br><br>
 
        <button type="submit">Send Message</button>
<button type="reset">Reset</button>
 
    </form>
 
</body>
 
</html>
